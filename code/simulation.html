<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Simulation – Little Thinkers Lab</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        input, button {
            margin: 5px;
            padding: 10px;
            width: 90%;
        }

        button {
            background: #e63946;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #8ac926;
        }
    </style>
</head>

<body>

<h1>👶 Little Thinkers Lab – Simulation</h1>

<div class="box" id="loginBox">
    <h3>Login</h3>
    <input type="text" id="username" placeholder="Benutzername">
    <input type="password" id="password" placeholder="Passwort">
    <button onclick="login()">Login</button>
    <p id="loginMessage"></p>
</div>

<div class="box" id="menuBox" style="display:none;">
    <h3 id="roleTitle"></h3>
    <div id="menuButtons"></div>
</div>

<div class="box" id="outputBox" style="display:none;">
    <h3>Ausgabe</h3>
    <p id="output"></p>
</div>

<script>
const benutzer_db = {
    "arzt": {passwort: "1234", rolle: "Arzt"},
    "mfa": {passwort: "abcd", rolle: "MFA"},
    "admin": {passwort: "admin", rolle: "Administrator"}
};

let patientenakte = {
    Name: "Emma Schneider",
    Alter: "5",
    Diagnose: "Grippe"
};

let aktuelleRolle = null;

function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (benutzer_db[user] && benutzer_db[user].passwort === pass) {
        aktuelleRolle = benutzer_db[user].rolle;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("menuBox").style.display = "block";
        document.getElementById("roleTitle").innerText = "Rolle: " + aktuelleRolle;

        loadMenu();
    } else {
        document.getElementById("loginMessage").innerText = "Login fehlgeschlagen";
    }
}

function loadMenu() {
    let menu = document.getElementById("menuButtons");
    menu.innerHTML = "";

    if (aktuelleRolle === "Arzt") {
        menu.innerHTML += `<button onclick="anzeigen()">Patientenakte anzeigen</button>`;
        menu.innerHTML += `<button onclick="bearbeiten()">Diagnose ändern</button>`;
    }

    if (aktuelleRolle === "MFA") {
        menu.innerHTML += `<button onclick="anzeigen()">Patientenakte anzeigen</button>`;
    }

    if (aktuelleRolle === "Administrator") {
        menu.innerHTML += `<button onclick="backup()">Backup erstellen</button>`;
    }

    menu.innerHTML += `<button onclick="logout()">Logout</button>`;
}

function anzeigen() {
    document.getElementById("outputBox").style.display = "block";
    document.getElementById("output").innerText =
        `Name: ${patientenakte.Name}\nAlter: ${patientenakte.Alter}\nDiagnose: ${patientenakte.Diagnose}`;
}

function bearbeiten() {
    let neueDiagnose = prompt("Neue Diagnose eingeben:");
    if (neueDiagnose) {
        patientenakte.Diagnose = neueDiagnose;
        anzeigen();
    }
}

function backup() {
    document.getElementById("outputBox").style.display = "block";
    document.getElementById("output").innerText =
        "Backup wird erstellt...\nDaten gesichert!\nErfolgreich abgeschlossen.";
}

function logout() {
    location.reload();
}
</script>

</body>
</html>
